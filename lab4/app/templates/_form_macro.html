{% macro render_user_form(action, roles, errors={}, form_data={}, is_update=False) %}
<form method="POST" action="{{ action }}">
    {% if not is_update %}
    <div class="mb-3">
        <label>Логин *</label>
        <input type="text" name="login" class="form-control {% if errors.login %}is-invalid{% endif %}" value="{{ form_data.login|default('') }}">
        <div class="invalid-feedback">{{ errors.login }}</div>
    </div>
    <div class="mb-3">
        <label>Пароль *</label>
        <input type="password" name="password" class="form-control {% if errors.password %}is-invalid{% endif %}">
        <div class="invalid-feedback">{{ errors.password }}</div>
    </div>
    {% endif %}
    
    <div class="mb-3">
        <label>Фамилия *</label>
        <input type="text" name="last_name" class="form-control {% if errors.last_name %}is-invalid{% endif %}" value="{{ form_data.last_name|default('') }}">
        <div class="invalid-feedback">{{ errors.last_name }}</div>
    </div>
    <div class="mb-3">
        <label>Имя *</label>
        <input type="text" name="first_name" class="form-control {% if errors.first_name %}is-invalid{% endif %}" value="{{ form_data.first_name|default('') }}">
        <div class="invalid-feedback">{{ errors.first_name }}</div>
    </div>
    <div class="mb-3">
        <label>Отчество</label>
        <input type="text" name="middle_name" class="form-control" value="{{ form_data.middle_name|default('') }}">
    </div>
    <div class="mb-3">
        <label>Роль</label>
        <select name="role_id" class="form-select">
            <option value="">-- Без роли --</option>
            {% for role in roles %}
            <option value="{{ role.id }}" {% if form_data.role_id|string == role.id|string %}selected{% endif %}>{{ role.name }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{{ url_for('index') }}" class="btn btn-secondary">Отмена</a>
</form>
{% endmacro %}
