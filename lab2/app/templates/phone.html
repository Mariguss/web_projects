{% extends 'base.html' %}
{% block content %}
<h3>Форма проверки телефона</h3>

<div class="mt-4" style="max-width: 400px;">
    <form method="POST">
        <div class="mb-3">
            <label for="phone" class="form-label">Введите номер телефона</label>
            <input type="text" class="form-control {% if error %}is-invalid{% endif %}" id="phone" name="phone" value="{{ raw_phone }}">
            
            {% if error %}
                <div class="invalid-feedback">{{ error }}</div>
            {% endif %}
        </div>
        <button type="submit" class="btn btn-success">Проверить</button>
    </form>

    {% if formatted_phone %}
        <div class="alert alert-success mt-4">
            <strong>Отформатированный номер:</strong><br>
            {{ formatted_phone }}
        </div>
    {% endif %}
</div>
{% endblock %}
