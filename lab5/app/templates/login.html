{% extends 'base.html' %}
{% block content %}
    <h1>Вход</h1>
    <form method="POST">
        <div class="mb-3">
            <label>Логин</label>
            <input type="text" name="login" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Пароль</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Войти</button>
    </form>
{% endblock %}
