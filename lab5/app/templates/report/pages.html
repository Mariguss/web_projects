{% extends 'base.html' %}
{% block content %}
    <h1>Отчет по страницам</h1>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>№</th>
                <th>Страница</th>
                <th>Количество посещений</th>
            </tr>
        </thead>
        <tbody>
            {% for path, count in query %}
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ path }}</td>
                <td>{{ count }}</td> 
            </tr>
            {% else %}
            <tr>
                <td colspan="3" class="text-center">Записей пока нет</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button class="btn btn-secondary" onclick="location.href='/report/export'">Импорт в csv</button>
{% endblock %}
